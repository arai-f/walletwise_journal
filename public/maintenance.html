<!doctype html>
<html lang="ja">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>メンテナンス中 | WalletWise Journal</title>
		<style>
			:root {
				--n50: #f9fafb;
				--n800: #1f2937;
				--s600: #4b5563;
			}
			html {
				font-family: "Inter", "BIZ UDPGothic", sans-serif;
				background-color: var(--n50);
				color: var(--n800);
				height: 100%;
			}
			body {
				margin: 0;
				display: flex;
				align-items: center;
				justify-content: center;
				min-height: 100vh;
				padding: 1rem;
			}
			.container {
				text-align: center;
				max-width: 400px;
			}
			.icon {
				font-size: 3rem;
				margin-bottom: 1.5rem;
				color: var(--s600);
			}
			h1 {
				font-size: 1.5rem;
				margin-bottom: 0.75rem;
			}
			p {
				color: var(--s600);
				line-height: 1.6;
			}
		</style>
	</head>
	<body>
		<div class="container">
			<div class="icon">🛠️</div>
			<h1>システムメンテナンスのお知らせ</h1>
			<p>
				現在、サービスを一時停止しております。<br />
				復旧まで今しばらくお待ちください。
			</p>
		</div>
	</body>
</html>

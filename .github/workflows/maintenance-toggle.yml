name: Toggle Maintenance Mode

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "メンテナンスモードの選択 (on でメンテ画面、off で通常画面)"
        required: true
        default: "on"
        type: choice
        options:
          - "on"
          - "off"

jobs:
  maintenance_deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Root Dependencies
        run: npm ci

      - name: Create firebaserc file
        run: |
          echo '{ "projects": { "default": "${{ secrets.PROJECT_ID }}" } }' > .firebaserc

      - name: Generate Firebase Config
        run: |
          mkdir -p public/src
          cat <<EOF > public/src/firebase-config.js
          export const firebaseConfig = {
            apiKey: "${{ secrets.API_KEY }}",
            authDomain: "${{ secrets.AUTH_DOMAIN }}",
            projectId: "${{ secrets.PROJECT_ID }}",
            storageBucket: "${{ secrets.STORAGE_BUCKET }}",
            messagingSenderId: "${{ secrets.MESSAGING_SENDER_ID }}",
            appId: "${{ secrets.APP_ID }}",
            measurementId: "${{ secrets.MEASUREMENT_ID }}"
          };
          export const recaptchaSiteKey = "${{ secrets.RECAPTCHA_SITE_KEY }}";
          export const vapidKey = "${{ secrets.VAPID_KEY }}";
          export const isLocalDevelopment = false;
          EOF

      - name: Build Frontend
        run: npm run build

      # ==========================================
      # メンテONのときだけ設定ファイルを差し替える
      # ==========================================
      - name: Switch to Maintenance Config
        if: ${{ github.event.inputs.mode == 'on' }}
        run: cp firebase.maintenance.json firebase.json

      # ==========================================
      # Firebase Hosting へのデプロイ（共通）
      # ==========================================
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}"
          channelId: live
          projectId: ${{ secrets.PROJECT_ID }}
          firebaseToolsVersion: 15.20.0

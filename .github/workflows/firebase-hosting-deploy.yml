name: Deploy to Firebase Hosting & Functions

on:
  push:
    branches:
      - deploy

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # 1. 変更されたディレクトリを検知するフィルター
      - name: Check for file changes
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'functions/**'
              - 'firestore.rules'
              - 'package.json'
              - 'package-lock.json'
            frontend:
              - 'public/**'
              - 'src/**'
              - 'package.json'
              - 'package-lock.json'
              - 'vite.config.js'

      # 2. 共通ステップ（GCP認証とNode.jsセットアップは常に実行）
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json

      # ==========================================
      # バックエンドのデプロイ（backendフィルターに一致した場合のみ）
      # ==========================================
      - name: Install Functions Dependencies
        if: steps.filter.outputs.backend == 'true'
        run: npm ci
        working-directory: functions

      - name: Deploy Backend (Functions & Rules)
        if: steps.filter.outputs.backend == 'true'
        run: |
          # Set environment variables for Functions
          echo "MIGRATION_SECRET=\"${{ secrets.MIGRATION_SECRET }}\"" > functions/.env
          # Deploy Functions and Firestore rules
          npx firebase-tools deploy --only functions,firestore:rules --project ${{ secrets.PROJECT_ID }} --force

      # ==========================================
      # フロントエンドのデプロイ（frontendフィルターに一致した場合のみ）
      # ==========================================
      - name: Install Root Dependencies
        if: steps.filter.outputs.frontend == 'true'
        run: npm ci

      - name: Create firebaserc file
        if: steps.filter.outputs.frontend == 'true'
        run: |
          echo '{ "projects": { "default": "${{ secrets.PROJECT_ID }}" } }' > .firebaserc

      - name: Generate Firebase Config
        if: steps.filter.outputs.frontend == 'true'
        run: |
          mkdir -p public/src
          cat <<EOF > public/src/firebase-config.js
          export const firebaseConfig = {
            apiKey: "${{ secrets.API_KEY }}",
            authDomain: "${{ secrets.AUTH_DOMAIN }}",
            projectId: "${{ secrets.PROJECT_ID }}",
            storageBucket: "${{ secrets.STORAGE_BUCKET }}",
            messagingSenderId: "${{ secrets.MESSAGING_SENDER_ID }}",
            appId: "${{ secrets.APP_ID }}",
            measurementId: "${{ secrets.MEASUREMENT_ID }}"
          };
          export const recaptchaSiteKey = "${{ secrets.RECAPTCHA_SITE_KEY }}";
          export const vapidKey = "${{ secrets.VAPID_KEY }}";
          export const isLocalDevelopment = false;
          EOF

      - name: Build Frontend
        if: steps.filter.outputs.frontend == 'true'
        run: npm run build

      - name: Deploy to Firebase Hosting
        if: steps.filter.outputs.frontend == 'true'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}"
          channelId: live
          projectId: ${{ secrets.PROJECT_ID }}
          firebaseToolsVersion: 15.20.0
